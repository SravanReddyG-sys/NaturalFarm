<div style="margin-top: 8%; margin-bottom: 10%;">
  <ng-container>
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm login-card">
          <div class="card-body">
            <h3 class="card-title text-center text-success mb-4">Login to Natural Farm</h3>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  formControlName="email"
                  placeholder="Enter your email"
                  [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                >
                <div class="invalid-feedback" *ngIf="loginForm.get('email')?.hasError('required')">
                  Email is required
                </div>
                <div class="invalid-feedback" *ngIf="loginForm.get('email')?.hasError('email')">
                  Please enter a valid email
                </div>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  formControlName="password"
                  placeholder="Enter your password"
                  [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                >
                <div class="invalid-feedback" *ngIf="loginForm.get('password')?.hasError('required')">
                  Password is required
                </div>
              </div>
              <button type="submit" class="btn btn-success w-100 mb-3" [disabled]="loginForm.invalid">Login</button>
            </form>
            <p class="text-center">
              Don't have an account? <a routerLink="/register" class="text-success">Register</a>
            </p>
          </div>
        </div>
      </div>
    </div>
</ng-container>

</div>
